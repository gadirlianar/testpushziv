        let quizzes = [];
        let currentQuiz = [];

        function parseData() {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let questions = [];
            let currentQ = null;

            lines.forEach(line => {
                if (/^\d+\.\s*/.test(line) || /^\(Q\d+\)\s*/.test(line) || /^Quiz\s*\d+:/i.test(line)) {
                    if (/^Quiz\s*\d+:/i.test(line)) return;
                    if (currentQ && currentQ.options.length > 0) {
                        currentQ.correct = currentQ.options[0];
                        questions.push(currentQ);
                    }
                    let qText = line.replace(/^\d+\.\s*/, '').replace(/^\(Q\d+\)\s*/, '');
                    currentQ = { question: qText, options: [] };
                } else if (currentQ) {
                    let optText = line.replace(/^[A-EА-Еa-eа-е]\)\s*/, '').replace(/[;.]+$/, '').trim();
                    if (optText.length > 0) {
                        currentQ.options.push(optText);
                    }
                }
            });
            if (currentQ && currentQ.options.length > 0) {
                currentQ.correct = currentQ.options[0];
                questions.push(currentQ);
            }

            for (let i = 0; i < questions.length; i += 15) {
                quizzes.push(questions.slice(i, i + 15));
            }

            const selector = document.getElementById('quiz-selector');
            quizzes.forEach((_, idx) => {
                let opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `Quiz ${idx + 1} (Suallar ${idx * 15 + 1} - ${Math.min((idx + 1) * 15, questions.length)})`;
                selector.appendChild(opt);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadQuiz() {
            const idx = document.getElementById('quiz-selector').value;
            if (!idx) return;

            currentQuiz = quizzes[idx];
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            document.getElementById('score-display').innerHTML = '';
            document.getElementById('score-display').style.background = 'transparent';
            document.getElementById('score-display').style.border = 'none';

            currentQuiz.forEach((q, qIndex) => {
                let block = document.createElement('div');
                block.className = 'quiz-block';
                block.innerHTML = `<h3>${q.question}</h3>`;

                let shuffledOptions = shuffle([...q.options]);

                shuffledOptions.forEach(opt => {
                    let label = document.createElement('label');
                    label.className = 'option';
                    label.innerHTML = `
                        <input type="radio" name="q${qIndex}" value="${opt.replace(/"/g, '&quot;')}">
                        ${opt}
                    `;
                    block.appendChild(label);
                });
                container.appendChild(block);
            });
            document.getElementById('submit-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkAnswers() {
            const blocks = document.querySelectorAll('.quiz-block');
            let score = 0;

            currentQuiz.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                const labels = blocks[idx].querySelectorAll('.option');

                labels.forEach(label => {
                    const input = label.querySelector('input');
                    if (input.value === q.correct.replace(/"/g, '&quot;')) {
                        label.classList.add('correct');
                    }
                    if (input.checked && input.value !== q.correct.replace(/"/g, '&quot;')) {
                        label.classList.add('incorrect');
                    }
                });

                if (selected && selected.value === q.correct.replace(/"/g, '&quot;')) score++;
            });

            const display = document.getElementById('score-display');
            display.style.background = score > 10 ? 'rgba(34, 197, 94, 0.15)' : (score > 5 ? 'rgba(234, 179, 8, 0.15)' : 'rgba(239, 68, 68, 0.15)');
            display.style.color = score > 10 ? '#4ade80' : (score > 5 ? '#facc15' : '#f87171');
            display.style.border = `1px solid ${score > 10 ? '#22c55e' : (score > 5 ? '#eab308' : '#ef4444')}`;
            display.innerHTML = `Analitik Nəticə: ${score} / 15 Doğru`;
            document.getElementById('submit-btn').style.display = 'none';
        }

        parseData(); 
    </script>
